<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f2f6fa" />
  <title>Bolão do PRTTS ⚽ Copa do Mundo 2026 🥇</title>
  <link rel="stylesheet" href="css/style.css?v=15" />
</head>
<body>

  <!-- ===================== TELA 1: LOGIN ===================== -->
  <section id="tela-login" class="tela">
    <div class="login-card">
      <h1 class="logo">Bolão do PRTTS<br /><span>⚽ Copa do Mundo 2026 🥇</span></h1>

      <div id="login-carregando" class="aviso">Carregando jogadores…</div>

      <form id="form-login" hidden>
        <label for="select-nome">Quem é você?</label>
        <select id="select-nome" required>
          <option value="" disabled selected>Selecione seu nome</option>
        </select>

        <label for="input-pin">PIN (4 dígitos)</label>
        <input id="input-pin" type="password" inputmode="numeric" pattern="\d{4}"
               maxlength="4" placeholder="••••" autocomplete="off" required />

        <button type="submit" id="btn-entrar" class="btn-primario">Entrar</button>
        <p id="login-erro" class="erro" hidden></p>
      </form>
    </div>
  </section>

  <!-- ===================== TELA 2: BÔNUS (CAMPEÃO / ARTILHEIRO) ===================== -->
  <section id="tela-bonus" class="tela" hidden>
    <div class="login-card">
      <h1 class="logo">🏆 Bônus</h1>
      <p class="aviso">Quem será o campeão e o artilheiro da Copa?<br />
        Cada acerto vale <strong>15 pts</strong>.<br />
        <strong>Atenção:</strong> depois de salvo, o palpite trava e não pode mais ser alterado!</p>

      <label for="input-campeao">Campeão</label>
      <select id="input-campeao">
        <option value="" disabled selected>Selecione a seleção</option>
      </select>

      <label for="input-artilheiro">Artilheiro</label>
      <input id="input-artilheiro" type="text" placeholder="Ex.: Vinícius Jr." maxlength="60" />

      <button id="btn-continuar" class="btn-primario">Continuar →</button>
      <p id="bonus-erro" class="erro" hidden></p>
    </div>
  </section>

  <!-- ===================== TELA 3: PALPITES ===================== -->
  <section id="tela-palpites" class="tela" hidden>
    <header class="topo">
      <div>
        <strong id="topo-nome"></strong>
        <small id="topo-status">Palpites carregados</small>
      </div>
      <div class="topo-acoes">
        <button id="btn-ranking" class="btn-fantasma">🥇 Ranking</button>
        <button id="btn-sair" class="btn-fantasma">Sair</button>
      </div>
    </header>

    <nav id="abas" class="abas"><!-- abas geradas via JS --></nav>

    <main id="conteudo" class="conteudo">
      <div id="paineis-grupos"></div>

      <div id="painel-ranking" class="painel" data-painel="ranking" hidden>
        <h2>🥇 Ranking</h2>
        <div class="sub-abas">
          <button class="sub-aba ativa" data-ranking="geral">Geral</button>
          <button id="sub-aba-brasil" class="sub-aba" data-ranking="brasil">🇧🇷 Jogos do Brasil</button>
        </div>
        <div id="ranking-brasil-chamada" class="chamada-brasil" hidden>
          🇧🇷 Quem mais entende da Seleção? ⚽ Rumo ao Hexa! 🏆
        </div>
        <ol id="lista-ranking" class="ranking"></ol>
      </div>
    </main>

    <footer class="rodape">
      <button id="btn-salvar" class="btn-primario">💾 Salvar Meus Palpites</button>
    </footer>
  </section>

  <div id="toast" class="toast" hidden></div>

  <script src="js/config.js?v=4"></script>
  <script src="js/app.js?v=20"></script>
</body>
</html>
